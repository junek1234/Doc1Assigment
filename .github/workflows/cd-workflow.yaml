name: CD - Deploy to Minikube using Github Actions

on:
  # Trigger the workflow on push from the master/main branch or on pull request
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Build job
  job1:
    name: Build and Deploy to Minikube
    # Run on Ubuntu using the latest version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube
        id: minikube
        uses: medyagh/setup-minikube@latest

      - name: Try the cluster !
        run: kubectl get pods -A

      - name: Build Image
        run: |
          export SHELL=/bin/bash
          eval $(minikube -p minikube docker-env)
          docker build -f ./Dockerfile -t springboot_doc_assigment:latest .
          echo -n "Verifying images: "
          docker images

      - name: Deploy to Minikube
        run: |
          kubectl apply -f deploy.yaml
          kubectl wait --for=condition=Ready pod -l io.kompose.service=a-backend --timeout=120s
          kubectl get all

      - name: Test service URLs
        run: |
          echo "SERVICE_URL=$(minikube service a-backend --url)"
          kubectl port-forward service/a-backend 8080:8080 &> /dev/null &
          sleep 5

      - name: Curl service
        run: |
          curl -i http://localhost:8080/

      - name: Cleanup
        run: |
          eval $(minikube docker-env -u)
          minikube delete