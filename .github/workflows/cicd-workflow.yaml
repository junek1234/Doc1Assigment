name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # 1. CI - Unit Tests
  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Run Tests
        run: mvn -B test

  # 2. CI - Build Artifact
  build:
    name: Build Application
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # 3. CD - Build Image and Deploy to Minikube
  deploy:
    name: Build Image and Deploy
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Start Minikube
        id: minikube
        uses: medyagh/setup-minikube@latest

      - name: Build Docker Image in Minikube
        run: |
          eval $(minikube -p minikube docker-env)
          docker build -f ./Dockerfile -t springboot_doc_assigment:latest .

      - name: Deploy to Minikube
        run: |
          kubectl apply -f deploy.yaml
          kubectl wait --for=condition=Ready pod -l io.kompose.service=a-backend --timeout=120s
          kubectl get all

      - name: Test Service availability
        run: |
          echo "SERVICE_URL=$(minikube service a-backend --url)"
          kubectl port-forward service/a-backend 8080:8080 &
          
          echo "Waiting for Spring Boot to start..."
          sleep 20
          
          curl --retry 5 --retry-delay 5 --retry-connrefused -i http://localhost:8080/

      - name: Cleanup
        if: always()
        run: |
          minikube delete
