name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # 1. CI - Unit Tests
  backend-tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14.1-alpine
        env:
          POSTGRES_DB: postgres-assigment
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Run Backend Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres-assigment
        run: mvn -B test

  frontend-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Run Frontend Tests
        run: cd frontend && npm test -- --passWithNoTests

  # 2. CI - Build Artifacts
  build-and-push:
    name: Build and Push Images
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Backend Build
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Build Backend with Maven
        run: mvn -B package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
#
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/via-tabloid-backend:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/via-tabloid-frontend:latest

  # 3. CD - Deploy to Minikube
  deploy:
    name: Deploy to Minikube
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Start Minikube
        id: minikube
        uses: medyagh/setup-minikube@latest

      - name: Build Docker Images in Minikube
        run: |
          eval $(minikube -p minikube docker-env)
          docker build -f ./Dockerfile -t via-tabloid-backend:latest .
          docker build -f ./frontend/Dockerfile -t via-tabloid-frontend:latest ./frontend

      - name: Deploy to Minikube
        run: |
          # Use locally built images and prevent image pull
          sed -i 's|image: springboot_doc_assigment:latest|image: via-tabloid-backend:latest\n          imagePullPolicy: Never|g' a-backend-deployment.yaml
          sed -i 's|image: a-frontend|image: via-tabloid-frontend:latest\n          imagePullPolicy: Never|g' a-frontend-deployment.yaml
          
          kubectl apply -f a-db-data-persistentvolumeclaim.yaml
          kubectl apply -f a-db-service.yaml
          kubectl apply -f a-db-deployment.yaml
          kubectl apply -f a-backend-service.yaml
          kubectl apply -f a-backend-deployment.yaml
          kubectl apply -f a-frontend-service.yaml
          kubectl apply -f a-frontend-deployment.yaml
          
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=Ready pod -l io.kompose.service=a-backend --timeout=120s
          kubectl wait --for=condition=Ready pod -l io.kompose.service=a-frontend --timeout=120s
          kubectl get all
