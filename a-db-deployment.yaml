apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: a-db
  name: a-db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: a-db
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: a-db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: postgres-assigment
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_USER
              value: postgres
          image: postgres:14.1-alpine
          name: postgres-assigment-container
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: a-db-data
      restartPolicy: Always
      volumes:
        - name: a-db-data
          persistentVolumeClaim:
            claimName: a-db-data
