apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: a-frontend
  name: a-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: a-frontend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: a-frontend
    spec:
      containers:
        - image: a-frontend
          name: node-assigment-container
          ports:
            - containerPort: 5173
              protocol: TCP
      restartPolicy: Always
