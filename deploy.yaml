apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: a-db-data
  name: a-db-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: a-db
  name: db
spec:
  ports:
    - name: "5432"
      port: 5432
      targetPort: 5432
  selector:
    io.kompose.service: a-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: a-db
  name: a-db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: a-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: a-db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: postgres-assigment
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_USER
              value: postgres
          image: postgres:14.1-alpine
          imagePullPolicy: IfNotPresent
          name: postgres-assigment-container
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: a-db-data
      restartPolicy: Always
      volumes:
        - name: a-db-data
          persistentVolumeClaim:
            claimName: a-db-data
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: a-backend
  name: a-backend
spec:
  type: NodePort
  ports:
    - name: "8080"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: a-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: a-backend
  name: a-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: a-backend
  template:
    metadata:
      labels:
        io.kompose.service: a-backend
    spec:
      containers:
        - env:
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://db:5432/postgres-assigment
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
          image: springboot_doc_assigment:latest
          imagePullPolicy: Never
          name: springboot-assigment-container
          ports:
            - containerPort: 8080
              protocol: TCP
      restartPolicy: Always
